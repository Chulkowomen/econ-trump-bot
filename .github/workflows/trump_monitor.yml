name: trump-monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check-truth-social:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CF_USERS_ENDPOINT: ${{ secrets.CF_USERS_ENDPOINT }}
          CF_API_SECRET: ${{ secrets.CF_API_SECRET }}
        run: python trump_monitor.py

      - name: Commit updated state
        run: |
          git config user.name "trump-monitor-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state_trump.json
          git diff --staged --quiet || git commit -m "chore: update state_trump.json"
          git push
