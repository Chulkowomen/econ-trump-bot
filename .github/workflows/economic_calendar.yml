name: economic-calendar

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  send-calendar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run calendar script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CF_USERS_ENDPOINT: ${{ secrets.CF_USERS_ENDPOINT }}
          CF_API_SECRET: ${{ secrets.CF_API_SECRET }}
        run: python economic_calendar.py

      - name: Commit heartbeat file
        run: |
          git config user.name "econ-calendar-bot"
          git config user.email "actions@users.noreply.github.com"
          if [ -f last_run.json ]; then
            git add last_run.json
            git diff --staged --quiet || git commit -m "chore: update last_run.json"
            git push
          else
            echo "last_run.json ще не створено — нічого комітити."
          fi
