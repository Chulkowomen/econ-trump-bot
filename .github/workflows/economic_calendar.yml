name: economic-calendar

on:
  schedule:
    - cron: '0 * * * *'   # щогодини; сам скрипт вирішує, чи зараз 8:00 за Мадридом
  workflow_dispatch: {}    # дозволяє запустити вручну кнопкою "Run workflow" для тесту

permissions:
  contents: write

jobs:
  send-calendar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run calendar script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python economic_calendar.py

      - name: Commit heartbeat file
        run: |
          git config user.name "econ-calendar-bot"
          git config user.email "actions@users.noreply.github.com"
          if [ -f last_run.json ]; then
            git add last_run.json
            git diff --staged --quiet || git commit -m "chore: update last_run.json"
            git push
          else
            echo "last_run.json ще не створено (скрипт пропустив запуск, бо не 8:00 за Мадридом) — нічого комітити."
          fi
